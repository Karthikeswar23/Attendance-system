<!DOCTYPE html>
<html>
<head>
    <title>Student Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://openfpcdn.io/fingerprintjs/v4"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; padding: 20px; background: #e9ecef; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #28a745; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input[readonly] { background-color: #f1f1f1; color: #555; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; }
        #message { text-align: center; margin-top: 20px; font-weight: bold; font-size: 16px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="formContainer">
        <h2>Mark Attendance</h2>
        
        <label>Room Code:</label>
        <input type="number" id="code" placeholder="4-digit code" required>

        <label>Full Name:</label>
        <input type="text" id="name" placeholder="As per records" required>

        <label>Batch:</label>
        <input type="text" id="batch" placeholder="e.g. 89r" required>

        <button id="subBtn" onclick="submitForm()">Submit Attendance</button>
    </div>
    <p id="message"></p>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";
    let deviceID = "";
    const todayStr = new Date().toDateString(); // e.g. "Mon Oct 23 2023"

    // 1. Generate Unique Device ID & Check Local Lock
    async function init() {
        const fp = await FingerprintJS.load().then(f => f.get());
        deviceID = fp.visitorId;

        // If user already submitted TODAY on this browser, block UI
        if (localStorage.getItem("last_success_date") === todayStr) {
            document.getElementById("formContainer").classList.add("hidden");
            const msg = document.getElementById("message");
            msg.style.color = "red";
            msg.innerText = "You have already marked attendance for today! See you tomorrow.";
        }
    }

    // 2. Auto-fill from QR Code
    const params = new URLSearchParams(window.location.search);
    if(params.has('code')) {
        document.getElementById('code').value = params.get('code');
        document.getElementById('code').readOnly = true;
    }

    // 3. Submit Attendance
    async function submitForm() {
        const msg = document.getElementById("message");
        const btn = document.getElementById("subBtn");
        
        const code = document.getElementById("code").value;
        const name = document.getElementById("name").value.trim();
        const batch = document.getElementById("batch").value.trim();

        if(!code || !name || !batch) {
            msg.innerText = "Please fill all fields.";
            msg.style.color = "red";
            return;
        }

        btn.disabled = true;
        btn.innerText = "Verifying...";

        try {
            // Get Student IP
            const ipRes = await fetch("https://api.ipify.org?format=json");
            const ipData = await ipRes.json();
            const studentIP = ipData.ip;

            // Submit to Google Sheets
            const url = `${GAS_URL}?action=submit_attendance&code=${code}&name=${encodeURIComponent(name)}&batch=${encodeURIComponent(batch)}&ip=${studentIP}&deviceId=${deviceID}`;
            
            const res = await fetch(url, { method: 'POST' });
            const resultText = await res.text();

            if(resultText === "Success") {
                // Lock the device locally for today
                localStorage.setItem("last_success_date", todayStr);
                document.getElementById("formContainer").classList.add("hidden");
                msg.style.color = "green";
                msg.innerText = "Success! Your attendance is recorded.";
            } else {
                msg.style.color = "red";
                msg.innerText = resultText;
                btn.disabled = false;
                btn.innerText = "Submit Attendance";
            }
        } catch(e) {
            msg.innerText = "Network error. Try again.";
            btn.disabled = false;
        }
    }

    init();
</script>
</body>
</html>
