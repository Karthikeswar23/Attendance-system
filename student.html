<!DOCTYPE html>
<html>

<head>

<title>Student Attendance</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:60px;
}

input{
padding:12px;
font-size:18px;
margin:10px;
width:250px;
}

button{
padding:15px;
font-size:20px;
background:green;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Mark Attendance</h1>

<input id="name" placeholder="Enter Name"><br>
<input id="batch" placeholder="Enter Batch"><br>
<input id="code" placeholder="Room Code"><br>

<button onclick="submitAttendance()">
Submit Attendance
</button>

<h2 id="msg"></h2>

<script>

const GAS_URL =
"https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";

async function submitAttendance(){

const name = document.getElementById("name").value;
const batch = document.getElementById("batch").value;
const code = document.getElementById("code").value;

if(name=="" || batch=="" || code==""){
alert("Fill all fields");
return;
}

const response = await fetch("https://api.ipify.org?format=json");
const data = await response.json();

const studentIP = data.ip;

const formData = new URLSearchParams();

formData.append("action","submit_attendance");
formData.append("name",name);
formData.append("batch",batch);
formData.append("code",code);
formData.append("ip",studentIP);

const res = await fetch(GAS_URL,{
method:"POST",
body:formData
});

const result = await res.json();

if(result.status=="success"){

document.getElementById("msg").innerHTML="✅ Attendance Marked";

}

else if(result.status=="duplicate"){

document.getElementById("msg").innerHTML="⚠️ Already Marked";

}

else if(result.status=="wifi_error"){

document.getElementById("msg").innerHTML="❌ Connect to Classroom WiFi";

}

else{

document.getElementById("msg").innerHTML="❌ Invalid Room Code";

}

}

</script>

</body>

</html>
