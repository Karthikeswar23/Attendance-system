<!DOCTYPE html>
<html>
<head>

<title>Student Attendance</title>

<style>

body{
font-family: Arial;
padding:20px;
max-width:400px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin:10px 0;
font-size:16px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:green;
color:white;
font-size:18px;
border:none;
cursor:pointer;
}

#message{
text-align:center;
font-weight:bold;
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Mark Attendance</h2>

<label>Room Code:</label>
<input type="number" id="code" placeholder="Enter 4-digit code from screen" required>

<label>Full Name:</label>
<input type="text" id="name" placeholder="John Doe" required>

<label>Batch Number:</label>
<input type="text" id="batch" placeholder="A1" required>

<button onclick="submitForm()" id="submitBtn">
Submit
</button>

<p id="message"></p>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";

const LOCK_HOURS = 10;


/* Auto-fill QR code */

const urlParams = new URLSearchParams(window.location.search);

if(urlParams.has('code')){

document.getElementById('code').value = urlParams.get('code');
document.getElementById('code').readOnly = true;

}


async function submitForm(){

const btn = document.getElementById("submitBtn");

btn.innerText="Submitting...";
btn.disabled=true;

const code = document.getElementById("code").value;
const name = document.getElementById("name").value.trim();
const batch = document.getElementById("batch").value.trim();

const msgDiv = document.getElementById("message");


if(code=="" || name=="" || batch==""){

msgDiv.innerText="Please fill all fields";
msgDiv.style.color="red";

btn.innerText="Submit";
btn.disabled=false;

return;

}


/* Prevent same student submission from same device */

const studentKey = name + "_" + batch;

const stored = localStorage.getItem(studentKey);

if(stored){

const now = new Date().getTime();
const diff = now - parseInt(stored);
const hours = diff/(1000*60*60);

if(hours < LOCK_HOURS){

msgDiv.style.color="red";
msgDiv.innerText="Your Name is already on the presentees list";

btn.innerText="Submit";
btn.disabled=false;

return;

}

}


try{

const response = await fetch("https://api.ipify.org?format=json");
const data = await response.json();

const studentIP = data.ip;

const reqUrl =
`${GAS_URL}?action=submit_attendance&code=${code}&name=${encodeURIComponent(name)}&batch=${encodeURIComponent(batch)}&ip=${studentIP}`;

const res = await fetch(reqUrl,{method:'POST'});

const resultText = await res.text();


if(resultText === "Success"){

localStorage.setItem(studentKey,new Date().getTime());

msgDiv.style.color="green";

msgDiv.innerText =
"Attendance Submitted! Date and Time recorded automatically.";

}
else{

msgDiv.style.color="red";
msgDiv.innerText=resultText;

}

}

catch(error){

msgDiv.style.color="red";
msgDiv.innerText="Network Error. Please try again.";

}


btn.innerText="Submit";
btn.disabled=false;

}

</script>

</body>
</html>
