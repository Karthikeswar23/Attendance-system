<!DOCTYPE html>
<html>

<head>

<title>Student Attendance</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:60px;
}

input{
padding:12px;
font-size:18px;
margin:10px;
width:260px;
}

button{
padding:15px;
font-size:20px;
background:green;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#msg{
margin-top:20px;
font-size:22px;
}

</style>

</head>

<body>

<h1>Mark Attendance</h1>

<input id="name" placeholder="Enter Name"><br>
<input id="batch" placeholder="Enter Batch"><br>

<input id="code" placeholder="Room Code"><br>

<button onclick="submitAttendance()">
Submit Attendance
</button>

<h2 id="msg"></h2>

<script>

const GAS_URL =
"https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec";


/* AUTO FILL ROOM CODE FROM QR LINK */

window.onload = function(){

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if(code){

document.getElementById("code").value = code;

}

}



/* SUBMIT ATTENDANCE */

async function submitAttendance(){

const name = document.getElementById("name").value.trim();
const batch = document.getElementById("batch").value.trim();
const code = document.getElementById("code").value.trim();

if(name=="" || batch=="" || code==""){

alert("Please fill all fields");
return;

}

document.getElementById("msg").innerHTML="Submitting...";

try{

const ipResponse = await fetch("https://api.ipify.org?format=json");
const ipData = await ipResponse.json();

const studentIP = ipData.ip;

const formData = new URLSearchParams();

formData.append("action","submit_attendance");
formData.append("name",name);
formData.append("batch",batch);
formData.append("code",code);
formData.append("ip",studentIP);

const res = await fetch(GAS_URL,{
method:"POST",
body:formData
});

const result = await res.json();


if(result.status=="success"){

document.getElementById("msg").innerHTML="✅ Attendance Marked Successfully";

}

else if(result.status=="duplicate"){

document.getElementById("msg").innerHTML="⚠️ Attendance Already Marked";

}

else if(result.status=="wifi_error"){

document.getElementById("msg").innerHTML="❌ Connect to Classroom WiFi";

}

else if(result.status=="invalid_code"){

document.getElementById("msg").innerHTML="❌ Invalid Room Code";

}

else{

document.getElementById("msg").innerHTML="❌ Error submitting";

}

}

catch(error){

console.log(error);

document.getElementById("msg").innerHTML="❌ Network Error";

}

}

</script>

</body>

</html>
