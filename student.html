<!-- Add this script tag in the <head> of student.html -->
<script src="https://openfpcdn.io/fingerprintjs/v4"></script>

<script>
    const GAS_URL = "https://script.google.com/macros/s/YOUR_URL_HERE/exec";
    const todayStr = new Date().toDateString();

    // 1. Initialize Fingerprint and check localStorage immediately
    let deviceFingerprint = "";

    async function initDeviceCheck() {
        const fpPromise = FingerprintJS.load();
        const fp = await fpPromise;
        const result = await fp.get();
        deviceFingerprint = result.visitorId; // This is the unique Device ID

        const lockedDate = localStorage.getItem("device_locked_date");
        if (lockedDate === todayStr) {
            showLockout("Attendance already recorded from this device (Local Lock).");
        }
    }
    initDeviceCheck();

    function showLockout(msg) {
        document.getElementById("formContainer").classList.add("hidden");
        const msgDiv = document.getElementById("message");
        msgDiv.style.color = "red";
        msgDiv.innerText = msg;
    }

    async function submitForm() {
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Validating Device...";
        btn.disabled = true;

        const code = document.getElementById("code").value;
        const name = document.getElementById("name").value.trim();
        const batch = document.getElementById("batch").value.trim();
        const msgDiv = document.getElementById("message");

        if(!code || !name || !batch) {
            msgDiv.innerText = "Please fill all fields";
            msgDiv.style.color = "red";
            btn.innerText = "Submit";
            btn.disabled = false;
            return;
        }

        try {
            const response = await fetch("https://api.ipify.org?format=json");
            const data = await response.json();
            const studentIP = data.ip;

            // Notice we added &deviceId= here
            const reqUrl = `${GAS_URL}?action=submit_attendance&code=${code}&name=${encodeURIComponent(name)}&batch=${encodeURIComponent(batch)}&ip=${studentIP}&deviceId=${deviceFingerprint}`;
            
            const res = await fetch(reqUrl, { method: 'POST' });
            const resultText = await res.text();

            if(resultText === "Success") {
                localStorage.setItem("device_locked_date", todayStr);
                document.getElementById("formContainer").classList.add("hidden");
                msgDiv.style.color = "green";
                msgDiv.innerText = "Attendance Submitted successfully!";
            } else {
                msgDiv.style.color = "red";
                msgDiv.innerText = resultText;
                btn.innerText = "Submit";
                btn.disabled = false;
            }
        } catch(error) {
            msgDiv.style.color = "red";
            msgDiv.innerText = "Network Error.";
            btn.innerText = "Submit";
            btn.disabled = false;
        }
    }
</script>
