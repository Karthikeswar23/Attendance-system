<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard - Attendance System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin-top: 50px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        button { padding: 20px 40px; font-size: 22px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        #qrcode { display: flex; justify-content: center; margin: 30px; padding: 10px; background: white; }
        h1 { color: #333; }
        .code-display { color: #d9534f; font-size: 50px; font-weight: bold; letter-spacing: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <button id="startBtn" onclick="startAttendance()">Take Attendance</button>

    <div id="dashboard" class="hidden">
        <h1>Scan to Mark Attendance</h1>
        <div id="qrcode"></div>
        <p>Or enter manually:</p>
        <div id="displayCode" class="code-display"></div>
        <p style="color: #666;">Note: Students must be on the same Wi-Fi network.</p>
    </div>
</div>

<script>
    // PASTE YOUR NEW GOOGLE DEPLOYMENT URL HERE
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";

    async function startAttendance(){
        const btn = document.getElementById("startBtn");
        btn.innerHTML = "Generating Session...";
        btn.disabled = true;

        const code = Math.floor(1000 + Math.random() * 9000);

        try {
            // Get Teacher's Public IP
            const response = await fetch("https://api.ipify.org?format=json");
            const data = await response.json();
            const teacherIP = data.ip;

            // Create Session in Google Sheets
            const apiResp = await fetch(`${GAS_URL}?action=create_session&code=${code}&ip=${teacherIP}`, { method: 'POST' });
            
            if (apiResp.ok) {
                document.getElementById("startBtn").classList.add("hidden");
                document.getElementById("dashboard").classList.remove("hidden");
                document.getElementById("displayCode").innerText = code;

                // Create the link for students
                // Replace the URL below with your actual hosted student.html link
                const studentLink = `https://karthikeswar23.github.io/Attendance-system/student.html?code=${code}`;
                
                document.getElementById("qrcode").innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: studentLink,
                    width: 250,
                    height: 250
                });
            } else {
                throw new Error("Failed to connect to Google Sheets");
            }
        } catch(err) {
            alert("Error: " + err.message);
            btn.innerHTML = "Take Attendance";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
