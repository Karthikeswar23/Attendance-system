<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { text-align: center; font-family: Arial; margin-top: 50px; }
        .hidden { display: none; }
        button { padding: 20px; font-size: 24px; background: blue; color: white; border: none; cursor: pointer; border-radius: 10px;}
        #qrcode { display: flex; justify-content: center; margin: 20px; }
    </style>
</head>
<body>

    <button id="startBtn" onclick="startAttendance()">Take Attendance</button>

    <div id="dashboard" class="hidden">
        <h1>Scan to Mark Attendance</h1>
        <div id="qrcode"></div>
        
        <h2 style="color: blue;">Laptop Users:</h2>
        <h3>Go to <span style="color:red;">yoursite.github.io/student.html</span></h3>
        <h3>Enter Room Code: <span id="displayCode" style="color:red; font-size:40px;"></span></h3>
    </div>

    <script>
        // REPLACE THIS WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";

        async function startAttendance() {
            document.getElementById("startBtn").innerHTML = "Generating...";
            
            // Generate random 4 digit code
            const code = Math.floor(1000 + Math.random() * 9000);
            
            // Get Teacher's Wi-Fi IP
            const response = await fetch("https://api.ipify.org?format=json");
            const data = await response.json();
            const teacherIP = data.ip;

            // Send to Google Sheets Database
            await fetch(`${GAS_URL}?action=create_session&code=${code}&ip=${teacherIP}`, { method: 'POST' });

            // Show Dashboard
            document.getElementById("startBtn").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("displayCode").innerText = code;

            // Generate QR Code (Change the URL to your actual GitHub URL)
            const studentLink = `https://karthikeswar23.github.io/Attendance-system/student.html?code=${code}`;
            new QRCode(document.getElementById("qrcode"), { text: studentLink, width: 250, height: 250 });
        }
    </script>
</body>

</html>
