<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>

        body{
            text-align:center;
            font-family:Arial;
            margin-top:50px;
        }

        button{
            padding:20px;
            font-size:22px;
            background:blue;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;
        }

        .hidden{
            display:none;
        }

        #qrcode{
            display:flex;
            justify-content:center;
            margin:30px;
        }

    </style>
</head>

<body>

<button id="startBtn" onclick="startAttendance()">
Take Attendance
</button>

<div id="dashboard" class="hidden">

<h1>Scan to Mark Attendance</h1>

<div id="qrcode"></div>

<h2 style="color:blue">Laptop Users:</h2>

<h3>
Go to 
<span style="color:red">
karthikeswar23.github.io/Attendance-system/student.html
</span>
</h3>

<h3>
Enter Room Code:
<span id="displayCode" style="color:red;font-size:40px"></span>
</h3>

</div>


<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";


async function startAttendance(){

document.getElementById("startBtn").innerHTML="Generating...";

const code = Math.floor(1000 + Math.random()*9000);

try{

const response = await fetch("https://api.ipify.org?format=json");
const data = await response.json();

const teacherIP = data.ip;

await fetch(`${GAS_URL}?action=create_session&code=${code}&ip=${teacherIP}`,{
method:'POST'
});


document.getElementById("startBtn").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

document.getElementById("displayCode").innerText = code;

const studentLink =
`https://karthikeswar23.github.io/Attendance-system/student.html?code=${code}`;

document.getElementById("qrcode").innerHTML="";

new QRCode(document.getElementById("qrcode"),{

text:studentLink,
width:250,
height:250

});

}

catch(err){

alert("Error creating session");
console.log(err);

}

}

</script>

</body>
</html>
