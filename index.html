<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { text-align: center; font-family: 'Segoe UI', Arial; margin-top: 50px; background: #f8f9fa; }
        .container { background: white; display: inline-block; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { padding: 20px 40px; font-size: 22px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        #qrcode { margin: 30px auto; display: flex; justify-content: center; border: 10px solid white; }
        #displayCode { color: #dc3545; font-size: 60px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="container">
        <button id="startBtn" onclick="startAttendance()">Take Attendance</button>

        <div id="dashboard" class="hidden">
            <h1>Scan to Mark Attendance</h1>
            <div id="qrcode"></div>
            <h3>Room Code:</h3>
            <div id="displayCode"></div>
            <p style="color: black;">All students must connect to the same Wi-Fi as the host.</p>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwmZZmrssoqD9_X_4Nza1uCxCjq0422pqwUt72WT0ybyrndwyiXi1sJ6AFe-VUhhSSQ/exec";

    async function startAttendance(){
        const btn = document.getElementById("startBtn");
        btn.innerText = "Generating Session...";
        btn.disabled = true;

        const code = Math.floor(1000 + Math.random()*9000);

        try {
            // Get Teacher's Public IP
            const response = await fetch("https://api.ipify.org?format=json");
            const data = await response.json();
            const teacherIP = data.ip;

            // Notify Google Sheets
            await fetch(`${GAS_URL}?action=create_session&code=${code}&ip=${teacherIP}`, { method: 'POST' });

            document.getElementById("startBtn").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("displayCode").innerText = code;

            // Generate Student Link
            const studentLink = `https://karthikeswar23.github.io/Attendance-system/student.html?code=${code}`;
            
            new QRCode(document.getElementById("qrcode"), {
                text: studentLink,
                width: 250,
                height: 250
            });
        } catch(err) {
            alert("Connection Error. Please check internet.");
            btn.innerText = "Take Attendance";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
